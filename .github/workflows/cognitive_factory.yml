name: 🧠 Cognitive Factory (Scheduled)

# 🔥 核心修正：取消事件监听，改为固定 2 小时步进
on:
  schedule:
    # 每 2 小时运行一次 (UTC 时间：0, 2, 4, 6...)
    # 这样可以确保你的 300 元余额能撑更久，且大师有足够的时间积累“预期差”
    - cron: '14 */2 * * *'
  
  # 保留手动按钮，方便你随时想看报告时手动点击执行
  workflow_dispatch: 

jobs:
  audit_and_ship:
    # 移除之前的 if 条件，因为现在是独立运行
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ 检出加工厂 (Refinery-Engine)
      - name: Checkout Refinery (Self)
        uses: actions/checkout@v4
        with:
          path: refinery

      # 2️⃣ 检出大师逻辑 (Masters-Council)
      - name: Checkout Masters (Logic)
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Masters-Council
          token: ${{ secrets.GH_PAT }}
          path: masters_repo

      # 3️⃣ 检出中央银行 (Central-Bank)
      - name: Checkout Vault (Storage)
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Central-Bank
          token: ${{ secrets.GH_PAT }}
          path: vault

      # 4️⃣ 环境准备
      - name: Setup Environment
        run: |
          rm -f refinery/masters
          mkdir -p refinery/masters
          cp -r masters_repo/masters/*.py refinery/masters/
          echo "✅ 大师插件装载完毕"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas pyarrow supabase PyGithub requests pytz

      # 5️⃣ 启动认知工厂
      - name: Run Cognitive Factory
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SILICON_FLOW_KEY: ${{ secrets.SILICON_FLOW_KEY }} 
        run: |
          cd refinery
          # 运行你的调度脚本
          python run_factory.py

      # 6️⃣ 资产入库
      - name: Ship to Central Bank
        run: |
          cd vault
          # 1. 强制声明身份 (解决 Author identity unknown)
          git config user.name "Cognitive Bot"
          git config user.email "bot@wenfp108.com"
          
          # 2. 检查是否有新产出的 .jsonl
          if [[ -n $(git status -s instructions/) ]]; then
            # 3. 暂存并提交本地改动 (这 1184 条就在这)
            git add instructions/
            git commit -m "🧠 Cognitive Audit: Batch update at $(date +'%Y-%m-%d %H:%M')"
            
            # 4. 关键：强制拉取并用 rebase 解决 [rejected] 冲突
            # 这会把你的这 1184 条数据“接”在仓库最新版本的后面
            echo "🔄 发现远程更新，正在执行 Rebase 同步..."
            git pull origin main --rebase
            
            # 5. 推送
            git push origin main
            echo "✅ 1184+ 条认知资产已安全入库中央银行。"
          else
            echo "💤 本轮无新信号生成，API 余额已受去重逻辑保护。"
          fi
