name: 🧠 Cognitive Factory (Scheduled)

# 🔥 核心修正：取消事件监听，改为固定 2 小时步进
on:
  schedule:
    # 每 2 小时运行一次 (UTC 时间：0, 2, 4, 6...)
    # 这样可以确保你的 300 元余额能撑更久，且大师有足够的时间积累“预期差”
    - cron: '14 */2 * * *'
  
  # 保留手动按钮，方便你随时想看报告时手动点击执行
  workflow_dispatch: 

concurrency:
  group: cognitive-factory
  cancel-in-progress: true

jobs:
  audit_and_ship:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      # 1️⃣ 检出加工厂 (Refinery-Engine)
      - name: Checkout Refinery (Self)
        uses: actions/checkout@v4
        with:
          path: refinery

      # 2️⃣ 检出大师逻辑 (Masters-Council)
      - name: Checkout Masters (Logic)
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Masters-Council
          token: ${{ secrets.GH_PAT }}
          path: masters_repo

      # 3️⃣ 检出中央银行 (Central-Bank)
      - name: Checkout Vault (Storage)
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Central-Bank
          token: ${{ secrets.GH_PAT }}
          path: vault

      # 4️⃣ 环境准备
      - name: Setup Environment
        run: |
          rm -f refinery/masters
          mkdir -p refinery/masters
          cp -r masters_repo/masters/*.py refinery/masters/
          echo "✅ 大师插件装载完毕"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas pyarrow supabase PyGithub requests pytz

      # 5️⃣ 启动认知工厂
      - name: Run Cognitive Factory
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SILICON_FLOW_KEY: ${{ secrets.SILICON_FLOW_KEY }} 
        run: |
          cd refinery
          # 运行你的调度脚本
          python run_factory.py

      # 6️⃣ 资产入库
      - name: Ship to Central Bank
        run: |
          cd vault
          git config user.name “Cognitive Bot”
          git config user.email “bot@wenfp108.com”

          if [[ -z $(git status -s instructions/) ]]; then
            echo “💤 本轮无新信号生成”
            exit 0
          fi

          git add instructions/
          git commit -m “🧠 Cognitive Audit: Batch update at $(date +'%Y-%m-%d %H:%M')”

          # 带重试的 push（应对其他 workflow 同时写入 Central-Bank）
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin main; then
              echo “✅ 认知资产已入库”
              exit 0
            fi
            echo “⏳ Push 失败，第 ${attempt}/3 次重试...”
            sleep 5
          done
          echo “❌ Push 最终失败”
          exit 1
