name: 🚀 Daily Heartbeat (Keep Alive Only)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ 修改日期并推送 (这就是你要的“手动改MD”)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 直接修改 README 里的日期
          sed -i "s/Last Updated: .*/Last Updated: $(date +%Y-%m-%d)/" README.md
          
          # 提交并推送
          git add README.md
          git commit -m "chore: daily heartbeat [skip ci]" || echo "No changes"
          git push
