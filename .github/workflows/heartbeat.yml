name: 🚀 Daily Heartbeat (Anti-Suspension)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Central-Bank
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Central-Bank
          path: Central-Bank
          token: ${{ secrets.GH_PAT }}

      - name: 🛡️ 稳健打卡
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          python3 << 'PYEOF'
          import datetime, os
          filename = "README.md"
          if os.path.exists(filename):
              with open(filename, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              with open(filename, "w", encoding="utf-8") as f:
                  for line in lines:
                      if "Last Updated" in line:
                          f.write(f"    * **Last Updated**: {datetime.date.today()}\n")
                      else:
                          f.write(line)
          PYEOF
          git add README.md
          git commit -m "chore: daily heartbeat [skip ci]" || echo "No changes"
          git pull --rebase
          git push

      - name: 📂 数据目录重组 (全部未归档)
        working-directory: Central-Bank
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          python3 << 'PYEOF'
          import os, re, subprocess, shutil
          from datetime import datetime, timedelta, timezone

          DATE_PATTERN = re.compile(r'^\d{4}-\d{2}-\d{2}$')
          SCAN_DIRS = [
              "papers/global",
              "polymarket/strategy",
              "polymarket/trends",
              "github/tech",
          ]

          bj_now = datetime.now(timezone(timedelta(hours=8)))
          today_str = bj_now.strftime("%Y-%m-%d")

          total_migrated = 0
          all_errors = []

          def git_mv(src, dst):
              """移动文件，目标已存在则覆盖"""
              os.makedirs(os.path.dirname(dst), exist_ok=True)
              if os.path.exists(dst):
                  # 目标已存在，用新文件覆盖
                  os.remove(dst)
                  print(f"  ♻️ 覆盖: {dst}")
              r = subprocess.run(["git", "mv", src, dst], capture_output=True, text=True)
              if r.returncode != 0:
                  all_errors.append(f"{src} → {dst}: {r.stderr.strip()}")
                  return False
              print(f"  ✅ {src} → {dst}")
              return True

          def reorganize_dir(base_dir):
              migrated = 0
              if not os.path.isdir(base_dir):
                  return 0
              for name in sorted(os.listdir(base_dir)):
                  if not DATE_PATTERN.match(name):
                      continue
                  if name >= today_str:
                      continue
                  src_path = os.path.join(base_dir, name)
                  if not os.path.isdir(src_path):
                      continue
                  y, m, d = name.split("-")
                  dst_path = os.path.join(base_dir, y, m, d)
                  print(f"\n📁 {src_path}")
                  for fname in sorted(os.listdir(src_path)):
                      if git_mv(os.path.join(src_path, fname), os.path.join(dst_path, fname)):
                          migrated += 1
                  try: os.rmdir(src_path)
                  except: pass
              return migrated

          # === 1. 目录类 ===
          for scan_dir in SCAN_DIRS:
              n = reorganize_dir(scan_dir)
              total_migrated += n
              if n > 0:
                  print(f"  📊 {scan_dir}: {n} 个文件")

          # === 2. Twitter 单文件 ===
          twitter_dir = "twitter"
          if os.path.isdir(twitter_dir):
              for name in sorted(os.listdir(twitter_dir)):
                  full = os.path.join(twitter_dir, name)
                  if os.path.isfile(full) and name.endswith(".json"):
                      date_str = name.replace(".json", "")
                      if DATE_PATTERN.match(date_str) and date_str < today_str:
                          y, m, d = date_str.split("-")
                          dst = os.path.join(twitter_dir, y, m, d, name)
                          if git_mv(full, dst):
                              total_migrated += 1

          # === 3. Reddit ===
          reddit_base = "reddit/sentiment"
          if os.path.isdir(reddit_base):
              for year in sorted(os.listdir(reddit_base)):
                  year_path = os.path.join(reddit_base, year)
                  if not os.path.isdir(year_path) or not year.isdigit():
                      continue
                  for month in sorted(os.listdir(year_path)):
                      month_path = os.path.join(year_path, month)
                      if not os.path.isdir(month_path) or not month.isdigit():
                          continue
                      for fname in sorted(os.listdir(month_path)):
                          if fname.endswith(".json"):
                              date_str = fname.replace(".json", "")
                              if DATE_PATTERN.match(date_str) and date_str < today_str:
                                  d = date_str.split("-")[2]
                                  dst = os.path.join(month_path, d, fname)
                                  if git_mv(os.path.join(month_path, fname), dst):
                                      total_migrated += 1

          # === 结果 ===
          print(f"\n{'='*50}")
          print(f"📊 总计: {total_migrated} 个文件")
          if all_errors:
              for e in all_errors: print(f"  ❌ {e}")
              raise SystemExit(1)
          if total_migrated > 0:
              subprocess.run(["git", "add", "-A"], check=True)
              subprocess.run(["git", "commit", "-m", f"chore: reorganize all flat dirs [skip ci]"], check=True)
              subprocess.run(["git", "pull", "--rebase"], check=True)
              for i in range(3):
                  if subprocess.run(["git", "push"]).returncode == 0:
                      print("✅ 推送成功"); break
                  import time; time.sleep(5)
          else:
              print("ℹ️ 所有目录已是层级结构")
          PYEOF
