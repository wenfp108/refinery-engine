name: 🚀 Daily Heartbeat Factory

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minimal-process:
    runs-on: ubuntu-latest
    steps:
      # 1. 拿代码
      - uses: actions/checkout@v4

      # 2. 安装必要的依赖（这是修复报错的关键）
      - name: 📦 Install Dependencies
        run: |
          pip install pandas
          # 如果你后面发现还缺别的库，可以在这里继续加，比如 pip install requests

      # 3. 跑脚本
      - name: ⚙️ Run 3 Scripts
        run: |
          python factory.py
          python refinery.py
          python run_factory.py

      # 4. 刷心跳（保活逻辑）
      - name: 🛡️ Heartbeat
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s/Last Updated: .*/Last Updated: $(date +%Y-%m-%d)/" README.md
          git add README.md && git commit -m "chore: daily heartbeat [skip ci]" && git push || echo "No changes"
