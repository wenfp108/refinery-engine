name: 🚀 Daily Heartbeat (Anti-Suspension)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ 稳健打卡
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          python3 << 'PYEOF'
          import datetime, os
          filename = "README.md"
          if os.path.exists(filename):
              with open(filename, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              with open(filename, "w", encoding="utf-8") as f:
                  for line in lines:
                      if "Last Updated" in line:
                          f.write(f"    * **Last Updated**: {datetime.date.today()}\n")
                      else:
                          f.write(line)
          PYEOF
          git add README.md
          git commit -m "chore: daily heartbeat [skip ci]" || echo "No changes"
          git pull --rebase
          git push

      - name: 📂 数据目录重组 (仅昨天)
        run: |
          python3 << 'PYEOF'
          import os, subprocess
          from datetime import datetime, timedelta, timezone

          bj_now = datetime.now(timezone(timedelta(hours=8)))
          target = bj_now - timedelta(days=2)
          target_str = target.strftime("%Y-%m-%d")
          y, m, d = target.strftime("%Y"), target.strftime("%m"), target.strftime("%d")
          print(f"📅 重组目标日期: {target_str} → {y}/{m}/{d}")

          migrated = 0
          errors = []

          def git_mv(src, dst):
              global migrated
              if os.path.exists(dst):
                  print(f"  ⚠️ 目标已存在: {dst}")
                  return False
              os.makedirs(os.path.dirname(dst), exist_ok=True)
              r = subprocess.run(["git", "mv", src, dst], capture_output=True, text=True)
              if r.returncode != 0:
                  errors.append(f"{src} → {dst}: {r.stderr.strip()}")
                  return False
              print(f"  ✅ {src} → {dst}")
              migrated += 1
              return True

          for src_base in [
              f"papers/global/{target_str}",
              f"polymarket/strategy/{target_str}",
              f"polymarket/trends/{target_str}",
              f"github/tech/{target_str}",
          ]:
              if os.path.isdir(src_base):
                  dst_base = src_base.replace(target_str, f"{y}/{m}/{d}")
                  for fname in sorted(os.listdir(src_base)):
                      git_mv(f"{src_base}/{fname}", f"{dst_base}/{fname}")
                  try: os.rmdir(src_base)
                  except: pass

          src_file = f"twitter/{target_str}.json"
          if os.path.isfile(src_file):
              git_mv(src_file, f"twitter/{y}/{m}/{d}/{target_str}.json")

          month_dir = f"reddit/sentiment/{y}/{m}"
          if os.path.isdir(month_dir):
              dst_dir = f"reddit/sentiment/{y}/{m}/{d}"
              for fname in sorted(os.listdir(month_dir)):
                  fpath = os.path.join(month_dir, fname)
                  if os.path.isfile(fpath):
                      git_mv(fpath, f"{dst_dir}/{fname}")

          print(f"📊 总计: {migrated} 个文件")
          if errors:
              for e in errors: print(f"  ❌ {e}")
              raise SystemExit(1)
          if migrated > 0:
              subprocess.run(["git", "commit", "-m", f"chore: reorganize {target_str} [skip ci]"], check=True)
              subprocess.run(["git", "pull", "--rebase"], check=True)
              for i in range(3):
                  if subprocess.run(["git", "push"]).returncode == 0:
                      print("✅ 推送成功"); break
                  import time; time.sleep(5)
          else:
              print("ℹ️ 无需重组")
          PYEOF
