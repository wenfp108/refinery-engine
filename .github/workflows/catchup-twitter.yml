name: 🐦 Twitter Catchup (One-Time)

on:
  workflow_dispatch:

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install supabase PyGithub

      - name: Run Twitter Catchup
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python catchup_twitter.py
