name: Portfolio Tracker

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 每个交易日 21:30 UTC (美股收盘后，约北京时间5:30)
    - cron: '0 1 1 * *'      # 每月1号 01:00 UTC (定投日)
  workflow_dispatch:

jobs:
  portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance akshare supabase requests

      - name: Run portfolio
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "01" ]; then
            echo "First of month - running DCA + snapshot"
            python portfolio.py dca
            python portfolio.py snapshot
          else
            echo "Daily - running snapshot only"
            python portfolio.py snapshot
          fi

      - name: Generate report
        run: python portfolio.py report

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report
          path: data/portfolio/report.md
