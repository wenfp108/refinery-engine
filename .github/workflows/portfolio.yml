name: Portfolio Tracker

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 每个交易日 21:30 UTC (美股收盘后)
    - cron: '0 1 1 * *'      # 每月1号 01:00 UTC (定投日)
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: false
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - dca
          - init

concurrency:
  group: portfolio
  cancel-in-progress: true

jobs:
  portfolio:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Central-Bank
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Central-Bank
          path: Central-Bank
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance akshare supabase requests

      - name: Run portfolio
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          CMD="${{ github.event.inputs.command }}"
          if [ -n "$CMD" ]; then
            echo "Manual trigger: $CMD"
            python portfolio.py $CMD
          else
            DAY=$(date +%d)
            if [ "$DAY" = "01" ]; then
              echo "First of month - DCA"
              python portfolio.py dca
            else
              echo "Daily - snapshot"
              python portfolio.py snapshot
            fi
          fi

      - name: Push results to Central-Bank
        run: |
          cd Central-Bank
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/portfolio/ reports/portfolio/

          if git diff --staged --quiet; then
            echo "💤 无新数据"
            exit 0
          fi

          git commit -m "Portfolio update $(date +%Y-%m-%d)"

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin main; then
              echo "✅ 推送成功"
              exit 0
            fi
            echo "⏳ Push 失败，第 ${attempt}/3 次重试..."
            sleep 5
          done
          echo "❌ Push 最终失败"
          exit 1
